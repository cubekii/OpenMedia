name: test_build.yml
on:
  push:
    branches:
      - main
      - add_workflows # develop
  pull_request:
    branches:
      - main

jobs:
  test_builds:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: gitdeps part
        uses: Nelonn/gitdeps@v0.2.3
        with:
          gitdeps_ver: 0.2.3
          gitdeps_args: -e omplayer

      - name: install deps
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update 
          sudo apt-get install -y cmake build-essential ninja-build libsdl2-dev libavcodec-dev libavutil-dev libavformat-dev ffmpeg libpipewire-0.3-dev nasm libxtst-dev libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxss-dev libxfixes-dev libxrender-dev

      - name: Clang Toolchain Installation for Linux
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20 all
          echo "CC=clang-20" >> $GITHUB_ENV
          echo "CXX=clang++-20" >> $GITHUB_ENV

      - name: cmake build part
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: cmake -B build -GNinja -DAUI_BOOT=OFF -DOPENMEDIA_INSTALL=OFF -DOPENMEDIA_EXAMPLE_PLAYER=ON -DCMAKE_ASM_NASM_COMPILER=nasm -DCMAKE_BUILD_TYPE=Release

      - name: try to compile
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: cmake --build build --target omplayer
