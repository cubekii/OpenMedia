name: test_build.yml
on:
  push:
    branches:
      - main
      - add_workflows # beta
  pull_request:
    branches:
      - main

jobs:
  test_builds:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: gitdeps part
        uses: Nelonn/gitdeps@v0.2.3
        with:
          gitdeps_ver: 0.2.3